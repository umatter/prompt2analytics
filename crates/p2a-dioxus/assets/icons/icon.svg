<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Analytics bars (representing data/charts) -->
  <g fill="url(#barGrad)" opacity="0.95">
    <!-- Bar 1 (shortest) -->
    <rect x="80" y="320" width="64" height="112" rx="8"/>
    <!-- Bar 2 -->
    <rect x="168" y="240" width="64" height="192" rx="8"/>
    <!-- Bar 3 (tallest) -->
    <rect x="256" y="160" width="64" height="272" rx="8"/>
    <!-- Bar 4 -->
    <rect x="344" y="200" width="64" height="232" rx="8"/>
  </g>

  <!-- Prompt/AI indicator (chat bubble with sparkle) -->
  <g transform="translate(380, 80)">
    <!-- Small chat bubble -->
    <path d="M0 40 C0 20, 20 0, 45 0 L75 0 C100 0, 120 20, 120 40 L120 70 C120 90, 100 110, 75 110 L35 110 L15 130 L20 110 C10 108, 0 95, 0 80 Z"
          fill="white" opacity="0.95"/>
    <!-- Sparkle/AI dots -->
    <circle cx="35" cy="55" r="8" fill="#3B82F6"/>
    <circle cx="60" cy="55" r="8" fill="#3B82F6"/>
    <circle cx="85" cy="55" r="8" fill="#3B82F6"/>
  </g>
</svg>
