# Docker Compose for prompt2analytics
# Usage:
#   docker compose up --build              # Build and run backend
#   docker compose --profile with-ollama up --build  # Include local Ollama LLM
#   docker compose down                    # Stop all services
#
# Note: The Dioxus frontend is not containerized.
# For the web/desktop UI, run natively:
#   cd crates/p2a-dioxus && dx serve  # or dx serve --platform desktop

services:
  # Rust backend (p2a-mcp with HTTP transport)
  #
  # SECURITY — read before exposing this publicly (e.g. a bring-your-own-key demo):
  #   * Do NOT set OPENAI_API_KEY / ANTHROPIC_API_KEY / OPENROUTER_API_KEY here.
  #     If present, the backend uses them for any request that omits a key
  #     (transport/http.rs), turning an unauthenticated public backend into an
  #     open proxy billed to your account. Leaving them unset = true BYOK.
  #   * The HTTP API has NO enforced authentication (P2A_AUTH_ENABLED config
  #     exists but is not wired into the router), so anyone who can reach this
  #     port can call all tools. Put it behind a TLS-terminating reverse proxy
  #     that adds HTTPS, rate-limiting, and request timeouts (exclude the SSE
  #     path /api/llm/chat/stream from response buffering / idle timeouts).
  #   * Set P2A_CORS_ORIGINS to your frontend origin; never use cors-permissive.
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: p2a-backend
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - P2A_HOST=0.0.0.0
      - P2A_PORT=8080
      # Lock CORS to your deployed frontend origin (comma-separated for several).
      # Leave empty to disallow cross-origin browser access entirely.
      - P2A_CORS_ORIGINS=${P2A_CORS_ORIGINS:-}
      # Max accepted request body (MiB); caps memory from oversized uploads.
      - P2A_MAX_HTTP_BODY_MB=${P2A_MAX_HTTP_BODY_MB:-32}
      # Persist the database under the mounted data volume (see below).
      - P2A_DB_PATH=/data
    restart: unless-stopped
    # --- Container hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    cpus: "2.0"
    # Writable data lives on a named volume; everything else can be read-only.
    volumes:
      - p2a-data:/data
    tmpfs:
      - /tmp
    # read_only rootfs is recommended but VERIFY first with `docker compose up`
    # that the only write paths are /data and /tmp, then uncomment:
    # read_only: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - p2a-network

  # Optional: Local LLM with Ollama
  # Activate with: docker compose --profile with-ollama up
  ollama:
    image: ollama/ollama:latest
    container_name: p2a-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    profiles:
      - with-ollama
    restart: unless-stopped
    networks:
      - p2a-network
    # Note: After starting, pull a model with:
    # docker exec p2a-ollama ollama pull llama3.2

networks:
  p2a-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  p2a-data:
    driver: local
