<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 305" width="750" height="305">
  <defs>
    <style>
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #333; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #333; }
      .sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #666; }
      .section-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #666; letter-spacing: 1px; }
      .count { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,6 L9,3 z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="750" height="305" fill="#fff"/>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" class="title">Tool Selection Evaluation Procedure</text>

  <!-- Test Cases -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="130" height="110" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="65" y="20" text-anchor="middle" class="section-title" fill="#1565C0">TEST CASES</text>

    <!-- Category list -->
    <text x="65" y="40" text-anchor="middle" class="sublabel">Regression (10)</text>
    <text x="65" y="54" text-anchor="middle" class="sublabel">Panel (10)</text>
    <text x="65" y="68" text-anchor="middle" class="sublabel">Causal (11)</text>
    <text x="65" y="82" text-anchor="middle" class="sublabel">+ 5 more categories</text>
    <text x="65" y="100" text-anchor="middle" class="count" fill="#1565C0">87 total</text>
  </g>

  <!-- Prompt Construction -->
  <g transform="translate(190, 70)">
    <rect x="0" y="0" width="120" height="90" rx="4" fill="#fff" stroke="#666" stroke-width="1.5"/>
    <text x="60" y="20" text-anchor="middle" class="label" font-weight="600">Prompt</text>

    <!-- Code block representation -->
    <rect x="10" y="32" width="100" height="48" rx="2" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="60" y="48" text-anchor="middle" class="sublabel" font-style="italic">"Estimate causal</text>
    <text x="60" y="60" text-anchor="middle" class="sublabel" font-style="italic">effect using DiD"</text>
    <text x="60" y="72" text-anchor="middle" class="sublabel">+ Tool schema</text>
  </g>

  <!-- LLM - using same icon style as chat_flow_v2.svg -->
  <g transform="translate(340, 55)">
    <rect x="0" y="0" width="110" height="120" rx="6" fill="#E0F7FA" stroke="#0097A7" stroke-width="2"/>
    <text x="55" y="20" text-anchor="middle" class="section-title" fill="#0097A7">LLM</text>

    <!-- LLM face icon - same as in chat_flow_v2.svg -->
    <g transform="translate(55, 50)">
      <rect x="-20" y="-14" width="40" height="28" rx="14" fill="#E0F7FA" stroke="#0097A7" stroke-width="2"/>
      <circle cx="-7" cy="-2" r="4" fill="#0097A7"/>
      <circle cx="7" cy="-2" r="4" fill="#0097A7"/>
    </g>

    <text x="55" y="84" text-anchor="middle" class="sublabel">Claude / GPT</text>
    <text x="55" y="98" text-anchor="middle" class="sublabel">Llama / Qwen</text>
    <text x="55" y="112" text-anchor="middle" class="sublabel">Ministral</text>
  </g>

  <!-- Tool Selection Output -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="100" height="90" rx="4" fill="#fff" stroke="#666" stroke-width="1.5"/>
    <text x="50" y="20" text-anchor="middle" class="label" font-weight="600">Selection</text>

    <rect x="10" y="32" width="80" height="48" rx="2" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="52" text-anchor="middle" class="sublabel" font-family="monospace" font-size="10">diff_in_diff</text>
    <text x="50" y="72" text-anchor="middle" class="sublabel">+ latency (ms)</text>
  </g>

  <!-- Scoring -->
  <g transform="translate(610, 55)">
    <rect x="0" y="0" width="110" height="120" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="55" y="20" text-anchor="middle" class="section-title" fill="#E65100">SCORING</text>

    <!-- Score categories -->
    <g transform="translate(10, 32)">
      <rect x="0" y="0" width="90" height="18" rx="2" fill="#4CAF50" fill-opacity="0.2" stroke="#4CAF50" stroke-width="1"/>
      <text x="45" y="13" text-anchor="middle" class="sublabel" fill="#2E7D32">Exact match</text>
    </g>
    <g transform="translate(10, 54)">
      <rect x="0" y="0" width="90" height="18" rx="2" fill="#8BC34A" fill-opacity="0.2" stroke="#8BC34A" stroke-width="1"/>
      <text x="45" y="13" text-anchor="middle" class="sublabel" fill="#558B2F">Acceptable</text>
    </g>
    <g transform="translate(10, 76)">
      <rect x="0" y="0" width="90" height="18" rx="2" fill="#FFC107" fill-opacity="0.2" stroke="#FFC107" stroke-width="1"/>
      <text x="45" y="13" text-anchor="middle" class="sublabel" fill="#F57F17">Category only</text>
    </g>
    <g transform="translate(10, 98)">
      <rect x="0" y="0" width="90" height="18" rx="2" fill="#f44336" fill-opacity="0.2" stroke="#f44336" stroke-width="1"/>
      <text x="45" y="13" text-anchor="middle" class="sublabel" fill="#c62828">Failed</text>
    </g>
  </g>

  <!-- Arrows -->
  <!-- Test Cases to Prompt -->
  <path d="M160,115 L190,115" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Prompt to LLM -->
  <path d="M310,115 L340,115" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- LLM to Selection -->
  <path d="M450,115 L480,115" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Selection to Scoring -->
  <path d="M580,115 L610,115" stroke="#E65100" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- Bottom: Output metrics -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="690" height="100" rx="6" fill="#FAFAFA" stroke="#ddd" stroke-width="1.5"/>
    <text x="345" y="22" text-anchor="middle" class="section-title">OUTPUT METRICS</text>

    <!-- Metrics boxes -->
    <g transform="translate(25, 35)">
      <rect x="0" y="0" width="140" height="55" rx="4" fill="#fff" stroke="#666" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" class="label" font-weight="600">Accuracy</text>
      <text x="70" y="38" text-anchor="middle" class="sublabel">(exact + acceptable)</text>
      <text x="70" y="50" text-anchor="middle" class="sublabel">/ total × 100</text>
    </g>

    <g transform="translate(185, 35)">
      <rect x="0" y="0" width="140" height="55" rx="4" fill="#fff" stroke="#666" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" class="label" font-weight="600">By Category</text>
      <text x="70" y="38" text-anchor="middle" class="sublabel">8 categories</text>
      <text x="70" y="50" text-anchor="middle" class="sublabel">8-13 tests each</text>
    </g>

    <g transform="translate(345, 35)">
      <rect x="0" y="0" width="140" height="55" rx="4" fill="#fff" stroke="#666" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" class="label" font-weight="600">Cost</text>
      <text x="70" y="38" text-anchor="middle" class="sublabel">Estimated from</text>
      <text x="70" y="50" text-anchor="middle" class="sublabel">token pricing</text>
    </g>

    <g transform="translate(505, 35)">
      <rect x="0" y="0" width="160" height="55" rx="4" fill="#fff" stroke="#666" stroke-width="1"/>
      <text x="80" y="20" text-anchor="middle" class="label" font-weight="600">Comparison</text>
      <text x="80" y="38" text-anchor="middle" class="sublabel">10 models evaluated</text>
      <text x="80" y="50" text-anchor="middle" class="sublabel">3 providers</text>
    </g>
  </g>

</svg>
