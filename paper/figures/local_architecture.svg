<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 420" width="650" height="420">
  <defs>
    <style>
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333; }
      .sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; fill: #666; }
      .section-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #666; letter-spacing: 1px; }
      .boundary-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #2E7D32; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2E7D32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="325" y="25" text-anchor="middle" class="title">Fully Local Deployment</text>

  <!-- Local Machine Boundary -->
  <rect x="100" y="45" width="530" height="330" rx="8" fill="#E8F5E9" fill-opacity="0.4" stroke="#2E7D32" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="365" y="65" text-anchor="middle" class="boundary-label">LOCAL MACHINE (No External Communication)</text>

  <!-- User (outside conceptually but interacting) -->
  <g transform="translate(40, 200)">
    <circle cx="0" cy="-12" r="10" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M-16,14 Q0,0 16,14" fill="none" stroke="#333" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" class="label" font-weight="600">User</text>
  </g>

  <!-- Chat Interface -->
  <g transform="translate(120, 95)">
    <rect x="0" y="0" width="130" height="70" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <!-- Window chrome -->
    <rect x="0" y="0" width="130" height="18" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
    <circle cx="12" cy="9" r="4" fill="#ff5f57"/>
    <circle cx="26" cy="9" r="4" fill="#febc2e"/>
    <circle cx="40" cy="9" r="4" fill="#28c840"/>
    <text x="65" y="45" text-anchor="middle" class="label">Chat Interface</text>
    <text x="65" y="58" text-anchor="middle" class="sublabel">Desktop / Web</text>
  </g>

  <!-- Ollama + Local LLM -->
  <g transform="translate(120, 195)">
    <rect x="0" y="0" width="130" height="80" rx="6" fill="#E0F7FA" stroke="#0097A7" stroke-width="2"/>
    <text x="65" y="18" text-anchor="middle" class="section-title" fill="#0097A7">LOCAL LLM</text>
    <!-- Llama icon suggestion -->
    <g transform="translate(25, 28)">
      <path d="M15,35 Q0,35 0,25 Q0,15 10,15 Q10,5 22,5 Q34,5 36,15 Q45,15 45,25 Q45,35 30,35 Z"
            fill="none" stroke="#0097A7" stroke-width="1.5" transform="scale(0.6)"/>
    </g>
    <text x="75" y="45" text-anchor="middle" class="label">Ollama</text>
    <text x="65" y="60" text-anchor="middle" class="sublabel">Llama 3.1 / Mistral / Qwen</text>
    <text x="65" y="72" text-anchor="middle" class="sublabel" fill="#0097A7">Tool selection</text>
  </g>

  <!-- MCP Server -->
  <g transform="translate(290, 145)">
    <rect x="0" y="0" width="120" height="55" rx="4" fill="#fff" stroke="#666" stroke-width="1.5"/>
    <!-- Server icon -->
    <rect x="12" y="12" width="22" height="8" rx="1" fill="none" stroke="#666" stroke-width="1.2"/>
    <rect x="12" y="24" width="22" height="8" rx="1" fill="none" stroke="#666" stroke-width="1.2"/>
    <circle cx="30" cy="16" r="2" fill="#0097A7"/>
    <circle cx="30" cy="28" r="2" fill="#0097A7"/>
    <text x="75" y="20" text-anchor="middle" class="label">MCP</text>
    <text x="75" y="32" text-anchor="middle" class="label">Server</text>
    <text x="60" y="47" text-anchor="middle" class="sublabel">101 Tools</text>
  </g>

  <!-- p2a-core Engine -->
  <g transform="translate(290, 235)">
    <rect x="0" y="0" width="200" height="80" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="100" y="18" text-anchor="middle" class="section-title" fill="#E65100">p2a-core ENGINE</text>

    <!-- Method boxes (compact) -->
    <g transform="translate(10, 28)">
      <rect x="0" y="0" width="55" height="40" rx="2" fill="#fff" stroke="#E65100" stroke-width="1"/>
      <text x="27" y="14" text-anchor="middle" class="sublabel" font-weight="600">Regression</text>
      <text x="27" y="26" text-anchor="middle" class="sublabel">OLS, Panel</text>
      <text x="27" y="36" text-anchor="middle" class="sublabel">IV, HDFE</text>
    </g>
    <g transform="translate(72, 28)">
      <rect x="0" y="0" width="55" height="40" rx="2" fill="#fff" stroke="#E65100" stroke-width="1"/>
      <text x="27" y="14" text-anchor="middle" class="sublabel" font-weight="600">Discrete</text>
      <text x="27" y="26" text-anchor="middle" class="sublabel">Logit, Probit</text>
      <text x="27" y="36" text-anchor="middle" class="sublabel">MLE</text>
    </g>
    <g transform="translate(134, 28)">
      <rect x="0" y="0" width="55" height="40" rx="2" fill="#fff" stroke="#E65100" stroke-width="1"/>
      <text x="27" y="14" text-anchor="middle" class="sublabel" font-weight="600">Time Series</text>
      <text x="27" y="26" text-anchor="middle" class="sublabel">VAR, ARIMA</text>
      <text x="27" y="36" text-anchor="middle" class="sublabel">VECM</text>
    </g>
  </g>

  <!-- Data Store -->
  <g transform="translate(530, 235)">
    <ellipse cx="40" cy="12" rx="30" ry="10" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <path d="M10,12 L10,60 Q40,80 70,60 L70,12" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="40" cy="60" rx="30" ry="10" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="40" y="100" text-anchor="middle" class="label" font-weight="600">Local Data</text>
    <text x="40" y="113" text-anchor="middle" class="sublabel">CSV, Parquet</text>
  </g>

  <!-- Arrows -->
  <!-- User to Chat -->
  <path d="M60,200 L115,145" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Chat to Ollama (bidirectional) -->
  <path d="M185,165 L185,190" stroke="#0097A7" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <!-- Ollama to MCP -->
  <path d="M250,235 L290,200" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="280" y="210" class="sublabel">Tool calls</text>

  <!-- MCP to Core -->
  <path d="M350,200 L350,230" stroke="#E65100" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="360" y="220" class="sublabel" fill="#E65100">Execute</text>

  <!-- Core to Data -->
  <path d="M490,275 L525,275" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Key callout -->
  <g transform="translate(440, 85)">
    <rect x="0" y="0" width="170" height="45" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="85" y="18" text-anchor="middle" class="label" fill="#2E7D32" font-weight="600">Complete Isolation</text>
    <text x="85" y="32" text-anchor="middle" class="sublabel" fill="#2E7D32">No cloud APIs</text>
    <text x="85" y="42" text-anchor="middle" class="sublabel" fill="#2E7D32">No external transmission</text>
  </g>

  <!-- Network crossed out icon -->
  <g transform="translate(555, 150)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#c62828" stroke-width="2"/>
    <line x1="7" y1="33" x2="33" y2="7" stroke="#c62828" stroke-width="2"/>
    <!-- WiFi icon inside -->
    <path d="M12,22 Q20,14 28,22" fill="none" stroke="#666" stroke-width="1.5"/>
    <path d="M15,26 Q20,20 25,26" fill="none" stroke="#666" stroke-width="1.5"/>
    <circle cx="20" cy="29" r="2" fill="#666"/>
  </g>

</svg>
