name: CI

on:
  push:
    branches: [main, full-rust-migration]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# This workflow runs on the free GitHub-hosted Ubuntu runner. The heavier
# checks (release builds, the `database` feature that pulls in duckdb-sys,
# the `cuda` feature, and the p2a-dioxus desktop target with WebKit/GTK) are
# deliberately excluded here — they run on the self-hosted Spark runner or
# during local validation. Keep this file boring and minutes-cheap.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /usr/share/swift /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h /

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Install system dependencies
        # `libopenblas-dev` for the matrix backend, `libfontconfig1-dev` for
        # the `visualization` feature (plotters → yeslogic-fontconfig-sys).
        # `p2a-cli` and `p2a-mcp` pull `p2a-core/full`, which includes
        # `visualization`, so fontconfig is required even when `p2a-core`
        # itself is built with the slimmer `ci` feature alias.
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libfontconfig1-dev

      - name: Run tests (cheap subset)
        # `p2a-core` uses the `ci` feature alias (full minus database) to avoid
        # duckdb-sys compile cost. `p2a-mcp` drops the SurrealDB-backed `db`
        # feature and the websocket deps. `p2a-cli` and `p2a-chat` use defaults.
        # `p2a-dioxus` is not compiled here — its WebKit/GTK deps dominate
        # compile time and it's tested locally.
        #
        # --tests runs unit + integration tests but skips doctests; the repo
        # carries a pre-existing backlog of doctest failures that are tracked
        # separately from CI.
        run: |
          cargo test -p p2a-core --tests --no-default-features --features ci
          cargo test -p p2a-mcp --tests --no-default-features --features "http,llm,auth"
          cargo test -p p2a-cli --tests
          cargo test -p p2a-chat --tests
        env:
          RUST_TEST_THREADS: 4

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /usr/share/swift /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h /

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Install system dependencies
        # See the test job for why `libfontconfig1-dev` is required.
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libfontconfig1-dev

      - name: Run Clippy
        # Warnings only — the project still carries a backlog of pre-existing
        # clippy violations in p2a-core. The lint runs so new regressions show
        # up in the logs, but doesn't gate merges.
        run: |
          cargo clippy -p p2a-core --no-default-features --features ci
          cargo clippy -p p2a-mcp --no-default-features --features "http,llm,auth"
          cargo clippy -p p2a-cli
          cargo clippy -p p2a-chat
